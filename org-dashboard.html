<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organization Dashboard - Bloodline</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <i class="fas fa-heartbeat"></i>
                <span>Bloodline</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="#" id="logoutBtn" class="logout-link">
                    <i class="fas fa-sign-out-alt"></i>
                    Logout
                </a></li>
            </ul>
            <div class="hamburger">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <!-- Dashboard Section -->
    <section class="dashboard-section">
        <div class="container">
            <h1 class="dashboard-title">
                <i class="fas fa-building"></i>
                Organization Dashboard
            </h1>

            <!-- Request Blood Form -->
            <div class="dashboard-card">
                <div class="card-header">
                    <h2>
                        <i class="fas fa-hand-holding-heart"></i>
                        Request Blood
                    </h2>
                </div>
                <form id="requestBloodForm" class="request-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="requiredBloodGroup">
                                <i class="fas fa-tint"></i>
                                Required Blood Group
                            </label>
                            <select id="requiredBloodGroup" name="bloodGroup" required>
                                <option value="">Select blood group</option>
                                <option value="A+">A+</option>
                                <option value="A-">A-</option>
                                <option value="B+">B+</option>
                                <option value="B-">B-</option>
                                <option value="AB+">AB+</option>
                                <option value="AB-">AB-</option>
                                <option value="O+">O+</option>
                                <option value="O-">O-</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="requestLocation">
                                <i class="fas fa-map-marker-alt"></i>
                                Location
                            </label>
                            <input type="text" id="requestLocation" name="location" required placeholder="Enter location">
                        </div>

                        <div class="form-group">
                            <label for="urgency">
                                <i class="fas fa-exclamation-triangle"></i>
                                Urgency Level
                            </label>
                            <select id="urgency" name="urgency" required>
                                <option value="">Select urgency</option>
                                <option value="low">Low</option>
                                <option value="medium">Medium</option>
                                <option value="high">High</option>
                                <option value="critical">Critical</option>
                            </select>
                        </div>
                    </div>

                    <div id="requestError" class="error-message"></div>
                    <div id="requestSuccess" class="success-message"></div>

                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-paper-plane"></i>
                        Submit Request
                    </button>
                </form>
            </div>

            <!-- Donor List Section -->
            <div class="dashboard-card">
                <div class="card-header">
                    <h2>
                        <i class="fas fa-users"></i>
                        Available Donors
                    </h2>
                </div>
                <div class="donor-list" id="donorList">
                    <!-- Donor cards will be populated by JavaScript -->
                </div>
            </div>

            <!-- Map Placeholder Section -->
            <div class="dashboard-card">
                <div class="card-header">
                    <h2>
                        <i class="fas fa-map"></i>
                        Donor Locations Map
                    </h2>
                </div>
                <div class="map-placeholder">
                    <i class="fas fa-map-marked-alt"></i>
                    <p>Map integration placeholder</p>
                    <p class="map-note">In a real application, this would display an interactive map showing donor locations.</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Bloodline. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
