<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donor Dashboard - Bloodline</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <i class="fas fa-heartbeat"></i>
                <span>Bloodline</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="#" id="logoutBtn" class="logout-link">
                    <i class="fas fa-sign-out-alt"></i>
                    Logout
                </a></li>
            </ul>
            <div class="hamburger">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <!-- Dashboard Section -->
    <section class="dashboard-section">
        <div class="container">
            <h1 class="dashboard-title">
                <i class="fas fa-user-circle"></i>
                Donor Dashboard
            </h1>

            <!-- Profile Card -->
            <div class="dashboard-card profile-card">
                <div class="card-header">
                    <h2>
                        <i class="fas fa-id-card"></i>
                        Your Profile
                    </h2>
                </div>
                <div class="profile-content">
                    <div class="profile-info">
                        <div class="info-item">
                            <span class="info-label">
                                <i class="fas fa-user"></i>
                                Name:
                            </span>
                            <span class="info-value" id="donorName">-</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">
                                <i class="fas fa-tint"></i>
                                Blood Group:
                            </span>
                            <span class="info-value blood-badge" id="donorBloodGroup">-</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">
                                <i class="fas fa-map-marker-alt"></i>
                                Location:
                            </span>
                            <span class="info-value" id="donorLocation">-</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">
                                <i class="fas fa-envelope"></i>
                                Email:
                            </span>
                            <span class="info-value" id="donorEmail">-</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">
                                <i class="fas fa-phone"></i>
                                Phone:
                            </span>
                            <span class="info-value" id="donorPhone">-</span>
                        </div>
                    </div>
                    <div class="availability-toggle">
                        <label class="toggle-label">
                            <span class="toggle-text">Availability Status:</span>
                            <button id="availabilityToggle" class="toggle-btn">
                                <span id="availabilityStatus">Available</span>
                                <i class="fas fa-toggle-on"></i>
                            </button>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Notifications Section -->
            <div class="dashboard-card">
                <div class="card-header">
                    <h2>
                        <i class="fas fa-bell"></i>
                        Blood Requests
                    </h2>
                </div>
                <div class="notifications-list" id="notificationsList">
                    <!-- Notifications will be populated by JavaScript -->
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Bloodline. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
